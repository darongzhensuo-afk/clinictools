<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>血脂換算小工具 - 大容診所</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --text-main: #334e68;
            --success: #27ae60;
            --accent: #e67e22;
        }
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            color: var(--primary);
            font-size: 1.5rem;
            margin: 0 0 10px 0;
        }
        p.subtitle {
            color: #627d98;
            font-size: 0.9rem;
            margin: 0;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--primary);
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--secondary);
        }
        input.calculated {
            background-color: #f0fff4;
            border-color: var(--success);
            font-weight: bold;
            color: var(--success);
        }
        .formula-info {
            background: #f8fafc;
            border-left: 4px solid var(--secondary);
            padding: 12px;
            font-size: 0.85rem;
            color: #475569;
            margin-top: 25px;
            border-radius: 4px;
        }
        .actions {
            margin-top: 30px;
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button.calculate {
            background: var(--secondary);
            color: white;
        }
        button.reset {
            background: #e2e8f0;
            color: #475569;
        }
        button.back {
            background: var(--primary);
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button:hover {
            opacity: 0.9;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>血脂自動換算</h1>
        <p class="subtitle">輸入任意三項，自動計算第四項</p>
    </header>

    <div class="input-group">
        <label for="tc">Total Cholesterol (TC) mg/dL</label>
        <input type="number" id="tc" placeholder="例如: 200">
    </div>

    <div class="input-group">
        <label for="tg">Triglycerides (TG) mg/dL</label>
        <input type="number" id="tg" placeholder="例如: 150">
    </div>

    <div class="input-group">
        <label for="hdl">HDL-C mg/dL</label>
        <input type="number" id="hdl" placeholder="例如: 50">
    </div>

    <div class="input-group">
        <label for="ldl">LDL-C mg/dL</label>
        <input type="number" id="ldl" placeholder="例如: 120">
    </div>

    <div class="formula-info">
        使用 Friedewald 公式: LDL = TC - HDL - (TG / 5) <br>
        <small>* 此公式於 TG > 400 mg/dL 時準確度大幅下降。</small>
    </div>

    <div class="actions">
        <button class="calculate" onclick="calculateMissing()">開始計算</button>
        <button class="reset" onclick="resetForm()">清除數據</button>
        <a href="../../index.html" style="flex: 1; text-decoration: none;">
            <button class="back" style="width: 100%;">返回首頁</button>
        </a>
    </div>

    <div class="footer">
        © 2026 大容診所 | 臨床輔助工具
    </div>
</div>

<script>
    const inputs = ['tc', 'tg', 'hdl', 'ldl'].map(id => document.getElementById(id));

    function calculateMissing() {
        const values = {};
        let filledCount = 0;
        let missingId = null;

        inputs.forEach(input => {
            const val = parseFloat(input.value);
            if (!isNaN(val) && input.value !== '') {
                values[input.id] = val;
                filledCount++;
                input.classList.remove('calculated');
            } else {
                missingId = input.id;
            }
        });

        if (filledCount === 3) {
            const missingInput = document.getElementById(missingId);
            let result;

            if (missingId === 'ldl') {
                result = values.tc - values.hdl - (values.tg / 5);
            } else if (missingId === 'tc') {
                result = values.ldl + values.hdl + (values.tg / 5);
            } else if (missingId === 'hdl') {
                result = values.tc - values.ldl - (values.tg / 5);
            } else if (missingId === 'tg') {
                result = (values.tc - values.hdl - values.ldl) * 5;
            }

            if (!isNaN(result)) {
                missingInput.value = Math.round(result * 10) / 10;
                missingInput.classList.add('calculated');
            }
        } else if (filledCount === 4) {
            alert('四項數值已填滿，若要重新計算，請先清除其中一項。');
        } else {
            alert('請至少輸入任意三項數值以計算第四項。');
        }
    }

    function resetForm() {
        inputs.forEach(input => {
            input.value = '';
            input.classList.remove('calculated');
        });
    }
</script>

</body>
</html>
