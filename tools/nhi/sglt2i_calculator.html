<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健保 SGLT2i 給付評估 (2026 現行規範)</title>
    <style>
        :root {
            --primary: #1a5276;
            --secondary: #2980b9;
            --accent: #d35400;
            --bg: #f4f6f7;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #c0392b;
        }
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 650px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        h1 {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 2px solid var(--secondary);
            padding-bottom: 10px;
        }
        .section {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #dcdde1;
            border-radius: 10px;
            background: #fafbfc;
        }
        .section-title {
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--primary);
            display: block;
            font-size: 1.1rem;
        }
        .input-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .input-row label {
            flex: 1;
            font-size: 0.95rem;
        }
        .input-row input[type="number"] {
            width: 120px;
            padding: 8px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            text-align: right;
        }
        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 0.95rem;
        }
        button {
            width: 100%;
            padding: 14px;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background: #1f618d;
        }
        #result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }
        .result-box {
            background: #fff;
            border: 1px solid #ecf0f1;
            border-left: 5px solid #95a5a6;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .status-approved { border-left-color: var(--success); }
        .status-rejected { border-left-color: var(--danger); }
        .status-warning { border-left-color: var(--warning); }
        
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            color: white;
            margin-bottom: 8px;
        }
        .badge-success { background: var(--success); }
        .badge-danger { background: var(--danger); }
        
        .footer {
            margin-top: 25px;
            text-align: center;
            font-size: 0.85rem;
            color: #7f8c8d;
        }
        .btn-home {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: var(--secondary);
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SGLT2 抑制劑 健保給付評估</h1>

    <div class="section">
        <span class="section-title">1. 數值指標 (必要填寫)</span>
        <div class="input-row">
            <label for="egfr">eGFR (腎絲球過濾率):</label>
            <input type="number" id="egfr" placeholder="例如: 45">
        </div>
        <div class="input-row">
            <label for="lvef">LVEF (左心室射出分率) %:</label>
            <input type="number" id="lvef" placeholder="例如: 35 或留空">
        </div>
        <div class="input-row">
            <label for="uacr">UACR (尿蛋白/肌酸酐比值):</label>
            <input type="number" id="uacr" placeholder="例如: 300 或留空">
        </div>
    </div>

    <div class="section">
        <span class="section-title">2. 臨床病史與用藥條件</span>
        <div class="checkbox-group">
            <label class="checkbox-item"><input type="checkbox" id="hasDM"> 確診第二型糖尿病 (T2DM)</label>
            <label class="checkbox-item" style="margin-left: 25px; color: #555;"><input type="checkbox" id="hasMetformin"> 已使用最大耐受劑量 Metformin 且控制不佳</label>
            <label class="checkbox-item" style="margin-left: 25px; color: #555;"><input type="checkbox" id="hasGLP1"> 目前正在使用 GLP-1 RA (如易妥讚、妥善得等)</label>
            <hr style="border: 0; border-top: 1px dashed #dcdde1; width: 100%;">
            <label class="checkbox-item"><input type="checkbox" id="hasHF"> 具心衰竭症狀 (NYHA II-IV)，且已使用標準心衰藥物 4 週</label>
            <label class="checkbox-item"><input type="checkbox" id="inCKDPlan"> 已加入健保 Early-CKD 或 Pre-ESRD 照護計畫</label>
        </div>
    </div>

    <button onclick="calculate()">開始評估健保資格</button>

    <div id="result">
        <!-- 結果將動態生成於此 -->
    </div>

    <a href="../../index.html" class="btn-home">⬅ 返回工具首頁</a>
    <div class="footer">
        系統邏輯依據：114年(2025) 3月1日擴大給付規範<br>
        僅供臨床參考，實際給付資格仍需依健保署最終審查為準。
    </div>
</div>

<script>
function calculate() {
    const egfrRaw = document.getElementById('egfr').value;
    const lvefRaw = document.getElementById('lvef').value;
    const uacrRaw = document.getElementById('uacr').value;
    
    if (!egfrRaw) {
        alert("請至少輸入 eGFR 數值，這是所有給付評估的基礎。");
        return;
    }

    const egfr = parseFloat(egfrRaw);
    const lvef = lvefRaw ? parseFloat(lvefRaw) : null;
    const uacr = uacrRaw ? parseFloat(uacrRaw) : null;

    const hasDM = document.getElementById('hasDM').checked;
    const hasMetformin = document.getElementById('hasMetformin').checked;
    const hasGLP1 = document.getElementById('hasGLP1').checked;
    const hasHF = document.getElementById('hasHF').checked;
    const inCKDPlan = document.getElementById('inCKDPlan').checked;

    const resultDiv = document.getElementById('result');
    let html = '';

    // 安全性警示 (禁忌症 / 低 eGFR)
    if (egfr < 20) {
        html += `<div class="result-box status-rejected">
            <span class="badge badge-danger">臨床警示</span>
            <strong>eGFR 過低 (${egfr})：</strong> 依多數仿單建議，eGFR < 20 或透析患者不建議起始 SGLT2i 治療。健保亦無明確對應給付。
        </div>`;
        resultDiv.innerHTML = html;
        resultDiv.style.display = 'block';
        return;
    }

    let approvedModes = [];
    let rejectionReasons = [];

    // --- 1. 評估心臟衰竭 (HF) 給付 ---
    if (hasHF && lvef !== null) {
        if (lvef <= 49) {
            approvedModes.push({
                type: '心衰竭 (HF)',
                desc: `符合 LVEF ≤ 49% (${lvef}%) 且已使用標準藥物滿 4 週。<br><small>不論有無糖尿病皆可給付 (Dapagliflozin/Empagliflozin 10mg)。</small>`
            });
        } else {
            rejectionReasons.push("心衰竭：LVEF > 49%，未達給付標準 (需 ≤ 49%)。");
        }
    } else if (lvef !== null && lvef <= 49 && !hasHF) {
        rejectionReasons.push("心衰竭：有 LVEF 數值但未勾選具備症狀或未完成 4 週標準治療。");
    }

    // --- 2. 評估慢性腎臟病 (CKD) 給付 (非 T2DM 也可) ---
    if (egfr >= 25 && egfr <= 60 && uacr !== null && uacr >= 200 && uacr <= 5000) {
        if (inCKDPlan) {
            approvedModes.push({
                type: '慢性腎臟病 (CKD)',
                desc: `符合 eGFR 25-60 (${egfr}) 且 UACR 200-5000 (${uacr})。<br><small>已加入健保 CKD 照護計畫，符合 2025/03 起之擴大給付。不論有無糖尿病皆可給付。</small>`
            });
        } else {
            rejectionReasons.push("慢性腎臟病：數值符合，但**尚未加入** Early-CKD/Pre-ESRD 照護計畫，無法申請給付。");
        }
    } else if (uacr !== null || (egfr >= 25 && egfr <= 60)) {
        if (uacr !== null && (uacr < 200 || uacr > 5000)) rejectionReasons.push("慢性腎臟病：UACR 未落在 200-5000 區間。");
        if (egfr < 25 || egfr > 60) rejectionReasons.push("慢性腎臟病：eGFR 未落在 25-60 區間。");
    }

    // --- 3. 評估糖尿病 (T2DM) 給付 ---
    if (hasDM) {
        if (egfr >= 30) {
            if (hasGLP1) {
                rejectionReasons.push("糖尿病：健保規定 SGLT2i 不得與 GLP-1 RA 併用 (兩者擇一)。");
            } else if (!hasMetformin) {
                rejectionReasons.push("糖尿病：必須先使用過最大耐受劑量的 Metformin 且控制不佳，方能給付。");
            } else {
                approvedModes.push({
                    type: '第二型糖尿病 (T2DM)',
                    desc: `符合 eGFR ≥ 30 (${egfr})，且已使用 Metformin。<br><small>注意：口服降血糖藥物總計以最多 4 種為限。</small>`
                });
            }
        } else {
            rejectionReasons.push("糖尿病：eGFR < 30，不符合糖尿病給付標準。");
        }
    }

    // --- 產出結果畫面 ---
    if (approvedModes.length > 0) {
        html += `<h3>✅ 符合健保給付資格</h3>`;
        html += `<p style="font-size:0.9rem; color:#555;">病患符合以下 ${approvedModes.length} 項給付途徑 (擇一申報即可)：</p>`;
        
        approvedModes.forEach(mode => {
            html += `<div class="result-box status-approved">
                <span class="badge badge-success">${mode.type} 途徑</span>
                <p style="margin: 8px 0 0 0;">${mode.desc}</p>
            </div>`;
        });

        if (rejectionReasons.length > 0) {
            html += `<div class="result-box status-warning" style="margin-top:20px;">
                <strong style="color:var(--warning)">其他途徑未通過原因 (供參)：</strong>
                <ul style="margin: 5px 0 0 0; padding-left: 20px; font-size:0.9rem;">
                    ${rejectionReasons.map(r => `<li>${r}</li>`).join('')}
                </ul>
            </div>`;
        }
    } else {
        html += `<h3>❌ 目前未達健保給付標準</h3>`;
        html += `<div class="result-box status-rejected">
            <strong style="color:var(--danger)">未通過原因：</strong>
            <ul style="margin: 10px 0 0 0; padding-left: 20px;">
                ${rejectionReasons.length > 0 ? rejectionReasons.map(r => `<li>${r}</li>`).join('') : `<li>臨床數值與病史未滿足糖尿病、心衰竭或 CKD 之任一給付門檻。</li>`}
            </ul>
            <p style="margin-top:15px; font-size:0.9rem;"><strong>建議：</strong> 若臨床上認為患者極需 SGLT2i 的器官保護效益，請向患者說明需採**自費**處方。</p>
        </div>`;
    }

    resultDiv.innerHTML = html;
    resultDiv.style.display = 'block';
}
</script>

</body>
</html>
