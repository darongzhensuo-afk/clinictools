<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>慢性病風險評估 (精準移植版) - 大容診所</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --text-main: #334e68;
            --danger: #e74c3c;
            --warning: #f39c12;
            --success: #27ae60;
            --border: #e2e8f0;
        }
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-items: start;
        }
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
        header { text-align: center; margin-bottom: 20px; grid-column: 1 / -1; }
        h1 { color: var(--primary); font-size: 1.6rem; margin: 0 0 5px 0; }
        .subtitle { color: #627d98; font-size: 0.9rem; margin: 0; }
        
        .section-title { font-size: 1.1rem; color: var(--secondary); margin-bottom: 15px; border-bottom: 2px solid var(--border); padding-bottom: 5px; margin-top: 0;}
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .input-group { margin-bottom: 5px; }
        .full-width { grid-column: 1 / -1; }
        
        label { display: block; margin-bottom: 6px; font-weight: 600; color: var(--primary); font-size: 0.9rem; }
        input[type="number"], select {
            width: 100%; padding: 10px; border: 2px solid var(--border); border-radius: 8px; font-size: 1rem; box-sizing: border-box; transition: 0.2s;
        }
        input:focus, select:focus { outline: none; border-color: var(--secondary); }
        
        .radio-group { display: flex; gap: 15px; margin-top: 5px;}
        .radio-group label { font-weight: normal; color: #475569; display: flex; align-items: center; gap: 5px;}
        
        button {
            width: 100%; padding: 12px; background: var(--secondary); color: white; border: none; border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: 0.2s; margin-top: 20px;
        }
        button:hover { background: #2980b9; }
        button.back { background: var(--primary); margin-top: 10px; }
        
        /* Result Section */
        .result-item { padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;}
        .result-name { font-weight: bold; color: var(--primary); }
        .risk-value { font-size: 1.2rem; font-weight: bold; }
        
        .risk-low { border-left: 5px solid var(--success); background: #f0fff4; }
        .risk-med { border-left: 5px solid var(--warning); background: #fffcf5; }
        .risk-high { border-left: 5px solid var(--danger); background: #fdf2f2; }
        
        .risk-low .risk-value { color: var(--success); }
        .risk-med .risk-value { color: var(--warning); }
        .risk-high .risk-value { color: var(--danger); }

        .advice-box { padding: 15px; border-radius: 8px; font-size: 0.9rem; color: #334e68; line-height: 1.6; margin-top: 20px; display: none;}
        .advice-box h4 { margin: 0 0 10px 0; font-size: 1.1rem;}
        .advice-box ul { margin: 0; padding-left: 20px; }
        
        .advice-low { background: #dcfce3; border: 1px solid var(--success); }
        .advice-low h4 { color: var(--success); }
        
        .advice-med { background: #fef08a; border: 1px solid var(--warning); }
        .advice-med h4 { color: #b45309; }
        
        .advice-high { background: #fee2e2; border: 1px solid var(--danger); }
        .advice-high h4 { color: var(--danger); }

    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>10年慢性病風險評估</h1>
        <p class="subtitle">依據國健署「科學算病館」本土模型 (35-70歲適用)</p>
    </header>

    <!-- 輸入區 -->
    <div class="card">
        <h2 class="section-title">基本資料與生理指標</h2>
        <div class="input-grid">
            <div class="input-group">
                <label>性別</label>
                <select id="gender">
                    <option value="1">男性</option>
                    <option value="0">女性</option>
                </select>
            </div>
            <div class="input-group">
                <label>年齡 (歲)</label>
                <input type="number" id="age" placeholder="35 - 70" min="35" max="70">
            </div>
            <div class="input-group">
                <label>身高 (公分)</label>
                <input type="number" id="height" placeholder="170" oninput="calcBMI()">
            </div>
            <div class="input-group">
                <label>體重 (公斤)</label>
                <input type="number" id="weight" placeholder="70" oninput="calcBMI()">
            </div>
            <div class="input-group">
                <label>BMI</label>
                <input type="number" id="bmi" readonly style="background: #f8fafc;">
            </div>
            <div class="input-group">
                <label>腰圍 (公分)</label>
                <input type="number" id="waist" placeholder="85">
            </div>
            <div class="input-group">
                <label>收縮壓 (mmHg)</label>
                <input type="number" id="sbp" placeholder="120">
            </div>
        </div>

        <h2 class="section-title" style="margin-top: 20px;">血液檢驗與病史</h2>
        <div class="input-grid">
            <div class="input-group">
                <label>空腹血糖 (mg/dL)</label>
                <input type="number" id="glucose" placeholder="95">
            </div>
            <div class="input-group">
                <label>總膽固醇 TC (mg/dL)</label>
                <input type="number" id="tc" placeholder="190">
            </div>
            <div class="input-group">
                <label>三酸甘油酯 TG (mg/dL)</label>
                <input type="number" id="tg" placeholder="140">
            </div>
            <div class="input-group">
                <label>高密度脂蛋白 HDL (mg/dL)</label>
                <input type="number" id="hdl" placeholder="45">
            </div>
            <div class="input-group">
                <label>低密度脂蛋白 LDL (mg/dL)</label>
                <input type="number" id="ldl" placeholder="110">
            </div>
            
            <div class="input-group full-width">
                <label>是否有吸菸習慣？</label>
                <div class="radio-group">
                    <label><input type="radio" name="smoking" value="1"> 是</label>
                    <label><input type="radio" name="smoking" value="0" checked> 否</label>
                </div>
            </div>
            <div class="input-group full-width">
                <label>是否已診斷為糖尿病？</label>
                <div class="radio-group">
                    <label><input type="radio" name="dm" value="1"> 是</label>
                    <label><input type="radio" name="dm" value="0" checked> 否</label>
                </div>
            </div>
            <div class="input-group full-width">
                <label>是否已診斷為高血壓？</label>
                <div class="radio-group">
                    <label><input type="radio" name="htn" value="1"> 是</label>
                    <label><input type="radio" name="htn" value="0" checked> 否</label>
                </div>
            </div>
        </div>
        
        <button onclick="calculateRisk()" id="calcBtn">開始評估 (精準本土模型)</button>
        <a href="../../index.html" style="text-decoration: none;">
            <button class="back">返回首頁</button>
        </a>
    </div>

    <!-- 結果區 -->
    <div class="card" id="resultContainer" style="opacity: 0.5; pointer-events: none;">
        <h2 class="section-title">未來 10 年發病風險評估</h2>
        
        <div id="resultsList">
            <!-- 動態生成結果 -->
            <div style="text-align: center; color: #94a3b8; padding: 20px;">請填寫左側資料並點擊計算</div>
        </div>

        <div id="adviceBox" class="advice-box">
            <h4 id="adviceTitle">處置建議</h4>
            <div id="adviceContent"></div>
        </div>
    </div>
</div>

<script>
    // 國健署平均風險基準值 (用於高血壓風險燈號判定)
    const AVG_HTN_MALE = [3.0, 3.4, 3.8, 4.3, 4.9, 5.5, 6.2, 7.0, 7.8, 8.8, 9.9, 11.1, 12.4, 13.9, 15.6, 17.5, 19.5, 21.8, 24.3, 27.1, 30.2, 33.6, 37.4, 41.5, 46.1, 51.1, 56.5, 62.4, 68.9, 75.9, 83.5, 91.8, 100.8, 110.6, 121.2, 132.7];
    const AVG_HTN_FEMALE = [2.2, 2.4, 2.7, 3.0, 3.3, 3.6, 4.0, 4.4, 4.8, 5.3, 5.8, 6.4, 7.0, 7.7, 8.4, 9.3, 10.2, 11.2, 12.3, 13.5, 14.8, 16.2, 17.7, 19.4, 21.2, 23.2, 25.3, 27.7, 30.2, 33.0, 35.9, 39.2, 42.7, 46.4, 50.5, 55.0];

    function calcBMI() {
        const h = parseFloat(document.getElementById('height').value) / 100;
        const w = parseFloat(document.getElementById('weight').value);
        const bmiField = document.getElementById('bmi');
        
        if (h > 0 && w > 0) {
            const bmi = (w / (h * h)).toFixed(1);
            bmiField.value = bmi;
        } else {
            bmiField.value = '';
        }
    }

    function calculateRisk() {
        const fields = ['age', 'height', 'weight', 'waist', 'sbp', 'glucose', 'tc', 'tg', 'hdl', 'ldl'];
        for (let f of fields) {
            if (!document.getElementById(f).value) {
                alert('請填寫所有必要資料！');
                return;
            }
        }

        const sbp = parseFloat(document.getElementById('sbp').value);
        
        const input = {
            gender: parseInt(document.getElementById('gender').value), // 1: M, 0: F
            age: parseFloat(document.getElementById('age').value),
            waist: parseFloat(document.getElementById('waist').value),
            sbp: sbp,
            bmi: parseFloat(document.getElementById('bmi').value),
            glu: parseFloat(document.getElementById('glucose').value),
            tc: parseFloat(document.getElementById('tc').value),
            tg: parseFloat(document.getElementById('tg').value),
            hdl: parseFloat(document.getElementById('hdl').value),
            ldl: parseFloat(document.getElementById('ldl').value),
            smoke: parseInt(document.querySelector('input[name="smoking"]:checked').value),
            dm_history: parseInt(document.querySelector('input[name="dm"]:checked').value),
            htn_history: parseInt(document.querySelector('input[name="htn"]:checked').value)
        };

        const results = {
            mace: calcMace(input),
            chd: calcChd(input),
            stroke: calcStroke(input),
            dm: input.dm_history ? null : calcDm(input),
            htn: (input.htn_history || sbp >= 140) ? 'OVER_LIMIT' : calcHtn(input)
        };

        renderResults(results, input);
    }

    function renderResults(data, inp) {
        document.getElementById('resultContainer').style.opacity = '1';
        document.getElementById('resultContainer').style.pointerEvents = 'auto';
        
        const metrics = [
            { id: 'mace', name: '心血管不良事件 (MACE)', val: data.mace },
            { id: 'chd', name: '冠心病', val: data.chd },
            { id: 'stroke', name: '腦中風', val: data.stroke },
            { id: 'dm', name: '糖尿病', val: data.dm },
            { id: 'htn', name: '高血壓預測', val: data.htn }
        ];

        let html = '';
        let highestRiskLevel = 0; // 0: low, 1: med, 2: high

        metrics.forEach(m => {
            if (m.val === null) {
                html += `
                <div class="result-item" style="background:#f1f5f9; color:#94a3b8;">
                    <div class="result-name">${m.name}</div>
                    <div>已確診，不適用預測</div>
                </div>`;
            } else if (m.id === 'htn' && m.val === 'OVER_LIMIT' && !inp.htn_history) {
                highestRiskLevel = 2; // SBP > 140 is high risk alert
                html += `
                <div class="result-item risk-high" style="flex-direction: column; align-items: flex-start; gap: 5px; height: auto;">
                    <div class="result-name">${m.name}</div>
                    <div style="font-size: 0.8rem; color: #b91c1c; line-height: 1.4;">⚠️ 收縮壓超過 140，疑有高血壓症狀，本試算不適用。</div>
                </div>`;
            } else if (m.val !== 'OVER_LIMIT') {
                const val = parseFloat(m.val);
                let riskClass = 'risk-low';
                let level = 0;

                // 燈號判定邏輯
                if (m.id === 'htn') {
                    const avgList = inp.gender === 1 ? AVG_HTN_MALE : AVG_HTN_FEMALE;
                    const avg = avgList[Math.max(0, Math.min(35, Math.floor(inp.age) - 35))];
                    const ratio = val / avg;
                    if (ratio > 1.25) { riskClass = 'risk-high'; level = 2; }
                    else if (ratio >= 0.75) { riskClass = 'risk-med'; level = 1; }
                } else {
                    if (val >= 20) { riskClass = 'risk-high'; level = 2; }
                    else if (val >= 10) { riskClass = 'risk-med'; level = 1; }
                }

                if (level > highestRiskLevel) highestRiskLevel = level;

                html += `
                <div class="result-item ${riskClass}">
                    <div class="result-name">${m.name}</div>
                    <div class="risk-value">${val.toFixed(1)}%</div>
                </div>`;
            }
        });

        document.getElementById('resultsList').innerHTML = html;
        renderAdvice(highestRiskLevel);
    }

    function renderAdvice(level) {
        const adviceBox = document.getElementById('adviceBox');
        const adviceTitle = document.getElementById('adviceTitle');
        const adviceContent = document.getElementById('adviceContent');
        
        adviceBox.style.display = 'block';
        adviceBox.className = 'advice-box'; // reset

        if (level === 2) {
            adviceBox.classList.add('advice-high');
            adviceTitle.innerText = "🚨 高風險 (紅燈)";
            adviceContent.innerHTML = `
                <ul>
                    <li><b>強烈建議立即就醫</b>，啟動相關慢性病檢查與治療。</li>
                    <li>需加入代謝症候群防治計畫，進行積極的醫療與生活介入。</li>
                    <li>嚴格控制血壓 (<130/80) 與低密度脂蛋白 (LDL)，戒除菸酒。</li>
                </ul>
            `;
        } else if (level === 1) {
            adviceBox.classList.add('advice-med');
            adviceTitle.innerText = "⚠️ 中風險 (黃燈)";
            adviceContent.innerHTML = `
                <ul>
                    <li>您處於疾病發生的中度風險區，建議進一步諮詢醫師。</li>
                    <li>請落實「三低一高」飲食原則（低油、低糖、低鹽、高纖）。</li>
                    <li>建立規律運動習慣（每週 150 分鐘中強度運動），並控制體重。</li>
                </ul>
            `;
        } else {
            adviceBox.classList.add('advice-low');
            adviceTitle.innerText = "✅ 低風險 (綠燈)";
            adviceContent.innerHTML = `
                <ul>
                    <li>您的慢性病發生風險較低，請繼續保持！</li>
                    <li>維持目前的健康飲食與規律運動習慣。</li>
                    <li>建議定期利用國健署「成人預防保健服務」追蹤數據。</li>
                </ul>
            `;
        }
    }

    // --- Core Algorithms (Reverse Engineered) ---

    function calcChd(inp) {
        let lp = 0;
        const logAge = Math.log10(inp.age);
        if (inp.gender === 1) { // Male
            lp = 8.3077 * (logAge - 1.7056) + 0.6715 * (inp.htn_history - 0.3485) + 0.0163 * (inp.waist - 82.0694) - 0.0081 * (inp.hdl - 53.06);
            return (1 - Math.pow(0.8936, Math.exp(lp))) * 100;
        } else { // Female
            lp = 9.3891 * (logAge - 1.6886) + 0.0425 * (inp.waist - 76.36177) + 0.0015 * (inp.sbp - 123.379) + 0.3581 * (inp.tc / inp.hdl - 3.5753) + 0.0001 * (inp.tg - 107.9153);
            return (1 - Math.pow(0.9405, Math.exp(lp))) * 100;
        }
    }

    function calcStroke(inp) {
        let lp = 0;
        const logAge = Math.log10(inp.age);
        if (inp.gender === 1) { // Male
            lp = 8.9714 * (logAge - 1.7093) + 0.0238 * (inp.sbp - 128.6824) + 0.0046 * (inp.glu - 100.2177) + 0.0017 * (inp.tg - 127.9926);
            return (1 - Math.pow(0.87, Math.exp(lp))) * 100;
        } else { // Female
            lp = 5.1186 * (logAge - 1.6963) + 0.7794 * (inp.smoke - 0.0522) + 0.023 * (inp.waist - 77.1681) + 0.4908 * (inp.htn_history - 0.342) + 0.581 * (inp.dm_history - 0.0914) + 0.0139 * (inp.sbp - 126.0013);
            return (1 - Math.pow(0.91, Math.exp(lp))) * 100;
        }
    }

    function calcMace(inp) {
        let lp = 0;
        const logAge = Math.log10(inp.age);
        if (inp.gender === 1) { // Male
            lp = 7.3146 * (logAge - 1.7056) + 0.0114 * (inp.waist - 82.0694) + 0.027 * (inp.sbp - 127.0251) - 0.0045 * (inp.hdl - 53.06);
            return (1 - Math.pow(0.82, Math.exp(lp))) * 100;
        } else { // Female
            lp = 6.8833 * (logAge - 1.6886) + 0.1923 * (inp.smoke - 0.0462) + 0.0257 * (inp.waist - 76.3618) + 0.0128 * (inp.sbp - 123.379) + 0.3054 * (inp.tc / inp.hdl - 3.5753);
            return (1 - Math.pow(0.9036, Math.exp(lp))) * 100;
        }
    }

    function calcDm(inp) {
        let lp = 0;
        const logAge = Math.log10(inp.age);
        if (inp.gender === 1) { // Male
            lp = 4.3665 * (logAge - 1.7126) + 0.1281 * (inp.bmi - 23.8756) + 0.0332 * (inp.glu - 94.1031) + 0.002 * (inp.tc - 196.9184) + 0.0024 * (inp.tg - 127.0042);
            return (1 - Math.pow(0.79, Math.exp(lp))) * 100;
        } else { // Female
            lp = 2.8928 * (logAge - 1.6939) + 0.0723 * (inp.bmi - 24.6413) + 0.0195 * (inp.waist - 76.6563) + 0.0334 * (inp.glu - 95.0456) + 0.0016 * (inp.tg - 111.8046) - 0.009 * (inp.hdl - 59.737);
            return (1 - Math.pow(0.76, Math.exp(lp))) * 100;
        }
    }

    function calcHtn(inp) {
        let lp = 0;
        const logAge = Math.log10(inp.age);
        if (inp.gender === 1) { // Male
            lp = 6.6698 * (logAge - 1.6973) + 0.0224 * (inp.sbp - 117.5462) + 0.0368 * (inp.bmi - 23.1587) - 0.0113 * (inp.hdl - 53.37) + 0.0008 * (inp.ldl - 116.9147);
            return (1 - Math.pow(0.65, Math.exp(lp))) * 100;
        } else { // Female
            lp = 4.1239 * (logAge - 1.6789) + 0.0647 * (inp.bmi - 24.0371) + 0.3866 * (inp.smoke - 0.051) + 0.0313 * (inp.sbp - 115.6778) + 0.0024 * (inp.tg - 105.1218) + 0.003 * (inp.glu - 96.3894);
            return (1 - Math.pow(0.6, Math.exp(lp))) * 100;
        }
    }
</script>

</body>
</html>
